<!DOCTYPE html>
<html lang="id">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MTC-PLANNER PORTAL.SERVER2</title>
    <style>
        /* Menghilangkan margin bawaan browser dan mengunci ukuran layar */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        /* Mengatur iframe agar memenuhi seluruh layar penuh */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Menyisipkan Google Apps Script dalam layar penuh -->

    </iframe>

</body>
</html>
